<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGenTele - Next-Generation Telecommunication System</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="logo">
                    <i class="fas fa-phone"></i>
                    <h1>NextGenTele</h1>
                </div>
                <nav class="nav">
                    <button id="loginBtn" class="btn btn-primary">Login</button>
                    <button id="registerBtn" class="btn btn-secondary">Register</button>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Login/Register Section -->
            <div id="authSection" class="auth-section">
                <div class="container">
                    <div class="auth-container">
                        <div class="auth-tabs">
                            <button id="loginTab" class="tab-btn active">Login</button>
                            <button id="registerTab" class="tab-btn">Register</button>
                        </div>
                        
                        <!-- Login Form -->
                        <div id="loginForm" class="auth-form">
                            <h2>Login to NextGenTele</h2>
                            <form id="loginFormData">
                                <div class="form-group">
                                    <label for="loginUsername">Username or Email</label>
                                    <input type="text" id="loginUsername" required>
                                </div>
                                <div class="form-group">
                                    <label for="loginPassword">Password</label>
                                    <input type="password" id="loginPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-full">Login</button>
                            </form>
                        </div>

                        <!-- Register Form -->
                        <div id="registerForm" class="auth-form" style="display: none;">
                            <h2>Register for NextGenTele</h2>
                            <form id="registerFormData">
                                <div class="form-group">
                                    <label for="registerUsername">Username</label>
                                    <input type="text" id="registerUsername" required>
                                </div>
                                <div class="form-group">
                                    <label for="registerEmail">Email</label>
                                    <input type="email" id="registerEmail" required>
                                </div>
                                <div class="form-group">
                                    <label for="registerPhone">Phone Number</label>
                                    <input type="tel" id="registerPhone">
                                </div>
                                <div class="form-group">
                                    <label for="registerPassword">Password</label>
                                    <input type="password" id="registerPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-full">Register</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dialer Interface -->
            <div id="dialerSection" class="dialer-section" style="display: none;">
                <div class="container">
                    <!-- Call Status -->
                    <div class="call-status">
                        <div id="callStatus" class="status-indicator">
                            <i class="fas fa-phone-slash"></i>
                            <span>Ready to dial</span>
                        </div>
                    </div>

                    <!-- Dialer Pad -->
                    <div class="dialer-container">
                        <div class="dialer-input">
                            <input type="tel" id="dialerNumber" placeholder="Enter phone number">
                            <div class="protocol-selector">
                                <label for="protocolSelect">Protocol:</label>
                                <select id="protocolSelect">
                                    <option value="SIP">SIP</option>
                                    <option value="WebRTC">WebRTC</option>
                                    <option value="PSTN">PSTN</option>
                                </select>
                            </div>
                        </div>

                        <div class="dialer-pad">
                            <div class="pad-row">
                                <button class="pad-btn" data-digit="1">1</button>
                                <button class="pad-btn" data-digit="2">2<span>ABC</span></button>
                                <button class="pad-btn" data-digit="3">3<span>DEF</span></button>
                            </div>
                            <div class="pad-row">
                                <button class="pad-btn" data-digit="4">4<span>GHI</span></button>
                                <button class="pad-btn" data-digit="5">5<span>JKL</span></button>
                                <button class="pad-btn" data-digit="6">6<span>MNO</span></button>
                            </div>
                            <div class="pad-row">
                                <button class="pad-btn" data-digit="7">7<span>PQRS</span></button>
                                <button class="pad-btn" data-digit="8">8<span>TUV</span></button>
                                <button class="pad-btn" data-digit="9">9<span>WXYZ</span></button>
                            </div>
                            <div class="pad-row">
                                <button class="pad-btn" data-digit="*">*</button>
                                <button class="pad-btn" data-digit="0">0<span>+</span></button>
                                <button class="pad-btn" data-digit="#">#</button>
                            </div>
                        </div>

                        <div class="call-controls">
                            <button id="callBtn" class="btn btn-call">
                                <i class="fas fa-phone"></i>
                                Call
                            </button>
                            <button id="hangupBtn" class="btn btn-hangup" style="display: none;">
                                <i class="fas fa-phone-slash"></i>
                                Hang Up
                            </button>
                            <button id="holdBtn" class="btn btn-hold" style="display: none;">
                                <i class="fas fa-pause"></i>
                                Hold
                            </button>
                            <button id="muteBtn" class="btn btn-mute" style="display: none;">
                                <i class="fas fa-microphone"></i>
                                Mute
                            </button>
                        </div>
                    </div>

                    <!-- AI Assistant Controls -->
                    <div class="ai-controls">
                        <h3>AI Assistant</h3>
                        <div class="ai-options">
                            <label>
                                <input type="checkbox" id="aiEnabled"> Enable AI Assistant
                            </label>
                            <select id="aiMode">
                                <option value="assistant">Assistant Mode</option>
                                <option value="screening">Call Screening</option>
                                <option value="auto-answer">Auto Answer</option>
                            </select>
                        </div>
                        <div id="aiStatus" class="ai-status"></div>
                    </div>

                    <!-- Active Calls -->
                    <div class="active-calls">
                        <h3>Active Calls</h3>
                        <div id="activeCallsList" class="calls-list">
                            <p class="no-calls">No active calls</p>
                        </div>
                    </div>

                    <!-- Call History -->
                    <div class="call-history">
                        <h3>Recent Calls</h3>
                        <div id="callHistoryList" class="calls-list">
                            <p class="loading">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <p>&copy; 2024 NextGenTele. Next-generation telecommunication system with AI integration.</p>
            </div>
        </footer>

        <!-- Notifications -->
        <div id="notifications" class="notifications"></div>
    </div>

    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Main Application -->
    <script src="/js/app.js"></script>
</body>
</html>
